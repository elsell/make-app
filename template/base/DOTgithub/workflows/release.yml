name: Release
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: release-main
  cancel-in-progress: false
jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      required: ${{ steps.plan.outputs.release_required }}
      tag: ${{ steps.plan.outputs.next_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with: {fetch-depth: 0}
      - id: plan
        run: scripts/plan-release.sh --github-output
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with: {go-version-file: go.work}
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with: {version: 11.0.7}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with: {node-version: 22.17.0, cache: pnpm}
      - run: pnpm install --frozen-lockfile
      - run: make verify
      - run: make acceptance
  publish:
    needs: plan
    if: needs.plan.outputs.required == 'true'
    runs-on: ubuntu-24.04
    permissions: {contents: write, packages: write, id-token: write, attestations: write}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with: {fetch-depth: 0}
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435
      - name: Build images for vulnerability scanning
        run: |
          docker build --file apps/api/Dockerfile --tag __APP_SLUG__-api:scan .
          docker build --file apps/web/Dockerfile --tag __APP_SLUG__-web:scan .
      - name: Scan API image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: __APP_SLUG__-api:scan
          fail-build: true
          severity-cutoff: high
      - name: Scan web image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: __APP_SLUG__-web:scan
          fail-build: true
          severity-cutoff: high
      - run: echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
        env: {GH_TOKEN: "${{ github.token }}"}
      - name: Build and push immutable images
        run: |
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          docker buildx build --file apps/api/Dockerfile --push --sbom=true --provenance=mode=max --tag "ghcr.io/$owner/__APP_SLUG__:${GITHUB_SHA}" .
          docker buildx build --file apps/web/Dockerfile --push --sbom=true --provenance=mode=max --tag "ghcr.io/$owner/__APP_SLUG__-web:${GITHUB_SHA}" .
      - name: Tag and release
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag "${{ needs.plan.outputs.tag }}" "$GITHUB_SHA"
          git push origin "${{ needs.plan.outputs.tag }}"
          gh release create "${{ needs.plan.outputs.tag }}" --target "$GITHUB_SHA" --generate-notes
        env: {GH_TOKEN: "${{ github.token }}"}
