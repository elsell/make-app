services:
  postgres:
    image: postgres:18.1-alpine@sha256:aa6eb304ddb6dd26df23d05db4e5cb05af8951cda3e0dc57731b771e0ef4ab29
    environment: { POSTGRES_USER: app, POSTGRES_PASSWORD: app, POSTGRES_DB: app }
    network_mode: host
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck: { test: [CMD-SHELL, "pg_isready -U app -d app"], start_period: 10s, interval: 2s, timeout: 2s, retries: 60 }
  spicedb-migrate:
    image: authzed/spicedb:v1.54.0@sha256:830527f85ac4cb40aaf3d3e8e3fe0b84cdace5ee81ceb43f905b3822ee580b82
    command: [datastore, migrate, head, --datastore-engine, postgres, --datastore-conn-uri, "postgres://app:app@localhost:5432/spicedb?sslmode=disable"]
    network_mode: host
    depends_on: { postgres: { condition: service_healthy } }
  app-migrate:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    entrypoint: [/migrate]
    environment:
      __ENV_PREFIX___DATABASE_DSN: postgres://app:app@localhost:5432/app?sslmode=disable
      __ENV_PREFIX___DATABASE_INSECURE: "true"
    network_mode: host
    depends_on: { postgres: { condition: service_healthy } }
  spicedb:
    image: authzed/spicedb:v1.54.0@sha256:830527f85ac4cb40aaf3d3e8e3fe0b84cdace5ee81ceb43f905b3822ee580b82
    command: [serve, --datastore-engine, postgres, --datastore-conn-uri, "postgres://app:app@localhost:5432/spicedb?sslmode=disable", --grpc-preshared-key, local-development-only-change-me]
    network_mode: host
    depends_on: { spicedb-migrate: { condition: service_completed_successfully } }
  dex:
    image: dexidp/dex:v2.44.0@sha256:5d0656fce7d453c0e3b2706abf40c0d0ce5b371fb0b73b3cf714d05f35fa5f86
    command: [dex, serve, /etc/dex/config.yaml]
    volumes: ["./deploy/dex/config.yaml:/etc/dex/config.yaml:ro"]
    network_mode: host
  spicedb-schema:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    entrypoint: [/schema]
    environment:
      __ENV_PREFIX___SPICEDB_ENDPOINT: localhost:50051
      __ENV_PREFIX___SPICEDB_TOKEN: local-development-only-change-me
      __ENV_PREFIX___SPICEDB_INSECURE: "true"
    depends_on: { spicedb: { condition: service_started } }
    network_mode: host
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    environment:
      __ENV_PREFIX___HTTP_ADDR: :8080
      __ENV_PREFIX___PUBLIC_BASE_URL: http://localhost:8080
      __ENV_PREFIX___DATABASE_DSN: postgres://app:app@localhost:5432/app?sslmode=disable
      __ENV_PREFIX___DATABASE_INSECURE: "true"
      __ENV_PREFIX___CURSOR_SIGNING_KEY: local-development-cursor-signing-key-change-me
      __ENV_PREFIX___OIDC_ISSUER: http://localhost:5556/dex
      __ENV_PREFIX___OIDC_AUDIENCES: __APP_SLUG__-web,__APP_SLUG__-mobile,__APP_SLUG__-docs
      __ENV_PREFIX___OIDC_DOCS_CLIENT_ID: __APP_SLUG__-docs
      __ENV_PREFIX___OIDC_DOCS_REDIRECT_URI: http://localhost:8080/docs
      __ENV_PREFIX___OIDC_INSECURE: "true"
      __ENV_PREFIX___CORS_ALLOWED_ORIGINS: http://localhost:5173
      __ENV_PREFIX___SPICEDB_ENDPOINT: localhost:50051
      __ENV_PREFIX___SPICEDB_TOKEN: local-development-only-change-me
      __ENV_PREFIX___SPICEDB_INSECURE: "true"
    depends_on: { app-migrate: { condition: service_completed_successfully }, dex: { condition: service_started }, spicedb-schema: { condition: service_completed_successfully } }
    network_mode: host
  web:
    image: node:24.4.1-alpine3.22@sha256:820e86612c21d0636580206d802a726f2595366e1b867e564cbc652024151e8a
    user: "${MAKE_APP_UID:-1000}:${MAKE_APP_GID:-1000}"
    working_dir: /workspace
    command: [sh, -lc, "corepack pnpm install --frozen-lockfile && corepack pnpm --dir apps/web dev"]
    volumes: [".:/workspace"]
    environment:
      CI: "true"
      HOME: /tmp/make-app-home
      XDG_CACHE_HOME: /tmp/make-app-cache
      COREPACK_HOME: /tmp/make-app-corepack
      PUBLIC_API_URL: http://localhost:8080
      PUBLIC_OIDC_ISSUER: http://localhost:5556/dex
      PUBLIC_OIDC_CLIENT_ID: __APP_SLUG__-web
    network_mode: host
    depends_on: [api]

volumes:
  postgres-data:
