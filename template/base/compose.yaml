services:
  postgres:
    image: postgres:17.5@sha256:6cf6142afacfa89fb28b894d6391c7dcbf6523c33178afc19ddc2b173c02f0d0
    environment: { POSTGRES_USER: app, POSTGRES_PASSWORD: app, POSTGRES_DB: app }
    ports: ["5432:5432"]
    healthcheck: { test: [CMD-SHELL, "pg_isready -U app"], interval: 2s, timeout: 2s, retries: 20 }
  spicedb:
    image: authzed/spicedb:v1.44.3@sha256:1bd15485c5c2ec08d3c96b604cfc4d53934dc7c0583fb7ce4b68691f59f8d4fe
    command: [serve-testing, --grpc-preshared-key, local-development-key]
    ports: ["50051:50051"]
  dex:
    image: ghcr.io/dexidp/dex:v2.43.1@sha256:11f6fbcd9b41a473e87ca85b7df80d765c3908d89eb77f725e6a94f7d586a0e1
    command: [dex, serve, /etc/dex/config.yaml]
    volumes: ["./deploy/dex/config.yaml:/etc/dex/config.yaml:ro"]
    ports: ["5556:5556"]
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    environment:
      __ENV_PREFIX___HTTP_ADDR: :8080
      __ENV_PREFIX___DATABASE_DSN: postgres://app:app@localhost:5432/app?sslmode=disable
      __ENV_PREFIX___OIDC_ISSUER: http://localhost:5556/dex
      __ENV_PREFIX___OIDC_AUDIENCE: __APP_SLUG__-web
      __ENV_PREFIX___CORS_ALLOWED_ORIGINS: http://localhost:5173
      __ENV_PREFIX___SPICEDB_ENDPOINT: localhost:50051
      __ENV_PREFIX___SPICEDB_TOKEN: local-development-key
    depends_on: { postgres: { condition: service_healthy }, dex: { condition: service_started }, spicedb: { condition: service_started } }
    network_mode: host
  web:
    image: registry.access.redhat.com/ubi9/nodejs-24@sha256:27dbb10d06365cc4627e4abb589780b3603feaac2577a231f95c193abfa0c04b
    working_dir: /workspace
    command: [bash, -lc, "corepack pnpm install --no-frozen-lockfile && corepack pnpm --dir apps/web dev"]
    volumes: [".:/workspace"]
    environment:
      PUBLIC_API_URL: http://localhost:8080
      PUBLIC_OIDC_ISSUER: http://localhost:5556/dex
      PUBLIC_OIDC_CLIENT_ID: __APP_SLUG__-web
    network_mode: host
    depends_on: [api]
