name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  generation-matrix:
    name: generation-matrix (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: default
        run: ./scripts/generation-case.sh default
      - name: without-example
        run: ./scripts/generation-case.sh without-example
      - name: all-field-types
        run: ./scripts/generation-case.sh all-field-types
      - name: irregular-plural
        run: ./scripts/generation-case.sh irregular-plural
      - name: multiple-domains
        run: ./scripts/generation-case.sh multiple-domains
      - name: example-removal
        run: ./scripts/generation-case.sh example-removal
      - name: schema-compatibility
        run: ./scripts/generation-case.sh schema-compatibility
      - name: identifier-boundaries
        run: ./scripts/generation-case.sh identifier-boundaries
      - name: existing-repository-adoption
        run: ./scripts/generation-case.sh existing-repository-adoption
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: make verify
  acceptance:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.0.7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.17.0
      - run: make acceptance
  android-native:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with: { go-version-file: go.mod }
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 11.0.7 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22.17.0 }
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.0.0
        with: { distribution: temurin, java-version: "17.0.15+6" }
      - run: go run . new NativeCI --module example.com/native-ci --output "$RUNNER_TEMP/native-ci" --without-example
      - run: pnpm install --frozen-lockfile
        working-directory: ${{ runner.temp }}/native-ci
      - run: pnpm --dir apps/mobile mobile:doctor
        working-directory: ${{ runner.temp }}/native-ci
      - run: pnpm --dir apps/mobile mobile:compat
        working-directory: ${{ runner.temp }}/native-ci
      - run: pnpm --dir apps/mobile mobile:build:android
        working-directory: ${{ runner.temp }}/native-ci
  ios-native:
    if: github.event_name != 'pull_request'
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with: { go-version-file: go.mod }
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 11.0.7 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22.17.0 }
      - run: go run . new NativeCI --module example.com/native-ci --output "$RUNNER_TEMP/native-ci" --without-example
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1
        with: { ruby-version: "3.2.9", bundler-cache: true, working-directory: "${{ runner.temp }}/native-ci/apps/mobile" }
      - run: pnpm install --frozen-lockfile
        working-directory: ${{ runner.temp }}/native-ci
      - run: pnpm --dir apps/mobile mobile:doctor
        working-directory: ${{ runner.temp }}/native-ci
      - run: pnpm --dir apps/mobile mobile:compat
        working-directory: ${{ runner.temp }}/native-ci
      - run: pnpm --dir apps/mobile mobile:build:ios
        working-directory: ${{ runner.temp }}/native-ci
