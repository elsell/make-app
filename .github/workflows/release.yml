name: Release
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
permissions: {contents: read, actions: read}
concurrency: {group: release-main, cancel-in-progress: false}
jobs:
  plan:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-24.04
    outputs:
      required: ${{ steps.plan.outputs.release_required }}
      tag: ${{ steps.plan.outputs.next_tag }}
      sha: ${{ steps.source.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Require the current main commit
        run: test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
      - name: Require successful CI evidence for manual publication
        if: github.event_name == 'workflow_dispatch'
        run: test "$(gh run list --workflow CI --commit "$SOURCE_SHA" --json conclusion,event --jq '[.[] | select(.conclusion == "success" and .event == "push")] | length')" -gt 0
        env: {GH_TOKEN: "${{ github.token }}", SOURCE_SHA: "${{ steps.source.outputs.sha }}"}
      - id: plan
        run: scripts/plan-release.sh --github-output
  publish:
    needs: plan
    if: needs.plan.outputs.required == 'true'
    runs-on: ubuntu-24.04
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ needs.plan.outputs.sha }}
      - name: Verify publication source
        run: test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
        env: {SOURCE_SHA: "${{ needs.plan.outputs.sha }}"}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with: {go-version-file: go.mod}
      - name: Build release archives
        run: |
          mkdir dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"; dir="make-app_${os}_${arch}"
            mkdir "$dir"; GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "$dir/make-app" .
            tar -czf "dist/${dir}.tar.gz" "$dir"; rm -rf "$dir"
          done
          (cd dist && sha256sum *.tar.gz > checksums.txt)
      - name: Tag and publish
        run: |
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$SOURCE_SHA"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag "${{ needs.plan.outputs.tag }}" "$SOURCE_SHA"
          git push origin "${{ needs.plan.outputs.tag }}"
          gh release create "${{ needs.plan.outputs.tag }}" --target "$SOURCE_SHA" --generate-notes dist/*
        env: {GH_TOKEN: "${{ github.token }}", SOURCE_SHA: "${{ needs.plan.outputs.sha }}"}
